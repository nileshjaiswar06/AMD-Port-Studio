services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/app/workspace
      - ./data:/app/data
    environment:
      - WORKSPACE_DIR=/app/workspace
      - DATABASE_PATH=/app/data/amd_port_studio.db
      - CORS_ORIGINS=http://localhost:3000

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend